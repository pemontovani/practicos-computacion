name: Deploy to VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pemontovani/practicos-computacion

jobs:
  build-and-push:
    name: Build & Push imagen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build y push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  deploy:
    name: Deploy al VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Login a ghcr.io
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u pemontovani --password-stdin

            # Pull la nueva imagen
            docker pull ghcr.io/pemontovani/practicos-computacion:latest

            # Reiniciar el contenedor con la nueva imagen
            cd /opt/practicos-computacion
            docker compose -f docker-compose.prod.yml --env-file .env up -d --pull always app

            # Limpiar imágenes viejas
            docker image prune -f
