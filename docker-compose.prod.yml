version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: practicos_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://practicos_user:${POSTGRES_PASSWORD}@db:5432/practicos_db
      NEXTAUTH_URL: https://practicos.pmontovani.com
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DOMAIN: practicos.pmontovani.com
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.practicos.rule=Host(`practicos.pmontovani.com`)"
      - "traefik.http.routers.practicos.entrypoints=websecure"
      - "traefik.http.routers.practicos.tls.certresolver=le"
      - "traefik.http.services.practicos.loadbalancer.server.port=3000"
      - "traefik.docker.network=n8n-traefik_app_network"
    networks:
      - n8n-traefik_app_network
      - practicos_internal
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    container_name: practicos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: practicos_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: practicos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - practicos_internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U practicos_user -d practicos_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  n8n-traefik_app_network:
    external: true
  practicos_internal:
    driver: bridge