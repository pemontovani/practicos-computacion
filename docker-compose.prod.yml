version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: carrera_db_prod
    environment:
      POSTGRES_USER: carrera
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: carrera_escolar
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carrera -d carrera_escolar']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: carrera_app_prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://carrera:${POSTGRES_PASSWORD}@postgres:5432/carrera_escolar
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://${DOMAIN}
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - internal
      - web

  nginx:
    image: nginx:alpine
    container_name: carrera_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - web

volumes:
  postgres_data_prod:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
