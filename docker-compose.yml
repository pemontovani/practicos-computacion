version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: carrera_db
    environment:
      POSTGRES_USER: carrera
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carrera2026}
      POSTGRES_DB: carrera_escolar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carrera -d carrera_escolar']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: carrera_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://carrera:${POSTGRES_PASSWORD:-carrera2026}@postgres:5432/carrera_escolar
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-supersecretdev}
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: >
      sh -c "
        npx prisma db push &&
        npm run db:seed &&
        npm run dev
      "

volumes:
  postgres_data:
